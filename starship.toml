# и®ҫзҪ®й…ҚзҪ®иҢғдҫӢпјҢејҖеҗҜзј–иҫ‘еҷЁзҡ„иҮӘеҠЁиЎҘе…Ё
"$schema" = 'https://starship.rs/config-schema.json'

# еңЁе‘Ҫд»Өд№Ӣй—ҙжҸ’е…Ҙз©әиЎҢ
add_newline = true

format = '''
(bold green)$shell $directory$all$character'''

# е°ҶжҸҗзӨәз¬Ұзҡ„вҖңвқҜвҖқжӣҝжҚўдёәвҖңвһңвҖқ
[character] # вҖңcharacterвҖқжҳҜжҲ‘д»¬жӯЈеңЁй…ҚзҪ®зҡ„з»„д»¶
success_symbol = "[вһң](bold green)" # и®ҫзҪ®вҖңsuccess_symbolвҖқ еӯ—ж®өдёәз»ҝиүІеҠ зІ—зҡ„вҖңвһңвҖқ

# зҰҒз”Ё package з»„д»¶пјҢе®Ңе…Ёйҡҗи—Ҹе®ғзҡ„жҸҗзӨәз¬Ұ
[package]
disabled = true

# A continuation prompt that displays two filled in arrows
continuation_prompt = "в–¶в–¶"

# жҳҫзӨәж–Үд»¶еӨ№и·Ҝеҫ„
[directory]
format = "[оӘғ $path]($style)[$read_only]($read_only_style) "
truncation_symbol = 'вҖҰ/'

[shell]
format = '[вқ®](bold yellow)[$indicator]($style)[вқҜ](bold yellow)'
powershell_indicator = 'pwsh'
fish_indicator = 'fish'
bash_indicator = 'bash'
unknown_indicator = 'mystery shell'
style = 'cyan bold'
disabled = false

[sudo]
style = 'bold green'
symbol = ' вҖҚ  '
disabled = false

